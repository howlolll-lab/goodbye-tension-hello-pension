<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Things will get better.</title>

<style>
:root{
  --bg:#f2f2f2;
  --card:#ffffff;
  --text:#141414;
  --muted:#6e6e6e;
  --line:#e6e6e6;
  --shadow: 0 10px 28px rgba(0,0,0,.06);
  --r:6px;
  --btn:#1f1f1f;
  --btnLine:#d9d9d9;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--text);}

/* layout */
.container{max-width:1100px;margin:auto;padding:20px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.topLeft{display:flex;gap:10px;align-items:center}
.brand{font-size:13px;font-weight:600}
.kpi{font-size:12px;color:var(--muted)}

.panel{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px}

/* icon buttons */
.topIcons{display:flex;gap:8px}
.iconBtn{
  width:40px;height:40px;border-radius:999px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--btnLine);
  cursor:pointer;font-size:16px;background:#fff;
}
.iconBtn.primary{background:var(--btn);color:#fff;border-color:var(--btn)}

/* circle */
.circleGrid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}
.circle{
  aspect-ratio:1/1;
  border-radius:999px;
  border:1px solid #ccc;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;
}

/* mobile */
@media(max-width:768px){
  .topbar{flex-direction:column;align-items:flex-start;gap:10px}
  .topIcons{align-self:flex-end}
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
  <div class="topLeft">
    <div>
      <div class="brand">Things will get better.</div>
      <div class="kpi">Demo UI</div>
    </div>
  </div>

  <div class="topIcons">
    <button class="iconBtn" title="Settings">⚙</button>
    <button class="iconBtn primary" title="Sign out">↗</button>
  </div>
</div>

<div class="panel">
  <h3>POINT CARD</h3>
  <div class="circleGrid">
    <div class="circle">1</div><div class="circle">2</div><div class="circle">3</div><div class="circle">4</div><div class="circle">5</div><div class="circle">6</div><div class="circle">7</div><div class="circle">8</div><div class="circle">9</div><div class="circle">10</div><div class="circle">11</div><div class="circle">12</div><div class="circle">13</div><div class="circle">14</div><div class="circle">15</div><div class="circle">16</div><div class="circle">17</div><div class="circle">18</div><div class="circle">19</div><div class="circle">20</div>
  </div>
</div>

</div>

</body>
</html>
