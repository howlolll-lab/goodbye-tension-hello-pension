<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Goodbye tension, hello pension</title>
  <style>
    :root{
      --bg:#f2f2f2;
      --card:#ffffff;
      --text:#141414;
      --muted:#6e6e6e;
      --line:#e6e6e6;
      --shadow: 0 10px 28px rgba(0,0,0,.06);
      --r:6px; /* ~0.5 */
      --btn:#1f1f1f;
      --btn2:#ffffff;
      --btnLine:#d9d9d9;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }
    *{box-sizing:border-box}
    body{ margin:0; font-family:var(--sans); background:var(--bg); color:var(--text); }
    .center{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card{
      width:min(380px, 100%);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      padding:32px;
    }
    .title{ text-align:center; margin-bottom:18px; }
    .title h1{ margin:0; font-size:22px; font-weight:650; letter-spacing:.2px; }
    .subtitle{ margin-top:6px; font-size:13px; color:var(--muted); }
    .form{ width:100%; display:flex; flex-direction:column; gap:10px; align-items:stretch; }
    .field{ display:flex; flex-direction:column; gap:6px; text-align:left; }
    .field label{ font-size:12px; color:var(--muted); }
    input, textarea{
      width:100%; padding:12px; border:1px solid var(--line);
      border-radius:var(--r); font-size:14px; outline:none; background:#fff;
    }
    textarea{ min-height:92px; resize:vertical }
    .btn{
      width:100%; padding:12px; border-radius:var(--r);
      border:1px solid transparent; cursor:pointer; font-size:14px;
    }
    .btn.primary{ background:var(--btn); color:#fff; }
    .btn.ghost{ background:var(--btn2); color:var(--text); border-color:var(--btnLine); }
    .btn:disabled{ opacity:.5; cursor:not-allowed }
    .hint{ margin-top:14px; text-align:center; font-size:12px; color:var(--muted); line-height:1.45; }

    /* app */
    .container{ max-width:1140px; margin:0 auto; padding:26px 18px 60px; }
    .topbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; }
    .topLeft{display:flex; align-items:center; gap:10px; min-width:0;}
    .hamburger{
      width:auto; padding:10px 12px; border-radius:var(--r);
      border:1px solid var(--btnLine); background:#fff; cursor:pointer; font-size:12px;
    }
    .kpi{ font-size:13px; color:var(--muted); }
    .brand{ font-size:13px; font-weight:650; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      padding:18px;
    }
    .panel h2{ margin:0 0 12px 0; font-size:15px; font-weight:650; }

    .shell{ display:block; }
    /* off-canvas drawer (overlay, does NOT compress content) */
    .drawerOverlay{
      position:fixed; inset:0; background:rgba(0,0,0,.28);
      display:none; z-index:70;
    }
    .drawerOverlay.show{display:block;}
    .drawer{
      position:fixed;
      top:0; left:0; bottom:0;
      width:280px;
      background:var(--card);
      border-right:1px solid var(--line);
      box-shadow: 14px 0 28px rgba(0,0,0,.10);
      padding:16px;
      transform: translateX(-102%);
      transition: transform .16s ease;
      z-index:80;
      overflow:auto;
    }
    .drawer.show{ transform: translateX(0); }
    .drawerTitle{
      font-weight:700; font-size:12px; letter-spacing:.14em; color:var(--muted);
      margin:6px 0 12px;
    }
    .nav{ display:flex; flex-direction:column; gap:8px; }
    .nav a{
      text-decoration:none; color:var(--text);
      border:1px solid var(--line); background:#fff;
      border-radius:var(--r); padding:10px 10px; font-size:13px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .nav a.active{ border-color: rgba(0,0,0,.22); }
    .nav small{ color:var(--muted); font-size:11px; }
    .content{ min-width:0; }

    /* dashboard metrics */
    .dashGrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .metric{
      border:1px solid var(--line);
      border-radius:var(--r);
      background:#fff;
      box-shadow:var(--shadow);
      padding:16px;
      cursor:pointer;
      transition: transform .08s ease, border-color .08s ease;
    }
    .metric:hover{ transform: translateY(-1px); border-color: rgba(0,0,0,.18); }
    .metric .k{ font-size:12px; color:var(--muted); }
    .metric .v{ margin-top:10px; font-size:26px; font-weight:750; letter-spacing:.2px; }
    .metric .s{ margin-top:6px; font-size:12px; color:var(--muted); line-height:1.35; }

    /* point card */
    .stack{ display:flex; flex-direction:column; gap:14px; }
    .twoCol{ display:grid; grid-template-columns: 1fr 1fr; gap:14px; }

    .pcShell{ border:1px solid var(--line); border-radius:var(--r); background:#fff; padding:18px; }
    .pcHead{
      display:flex; align-items:flex-end; justify-content:space-between; gap:10px;
      padding-bottom:12px; border-bottom:1px solid var(--line); margin-bottom:14px;
    }
    .pcMeta{ text-align:right; font-size:11px; color:var(--muted); line-height:1.4; font-family:var(--mono); }

    .circleGrid{ display:grid; grid-template-columns: repeat(10, 1fr); gap:10px; margin-top:10px; }
    .circleWrap{ position:relative; }
    .circle{
      aspect-ratio:1/1; border-radius:999px; border:1px solid rgba(0,0,0,.12);
      display:flex; align-items:center; justify-content:center;
      font-family:var(--mono); font-size:11px; user-select:none;
      background:#fff; color:rgba(0,0,0,.22); cursor:default; position:relative;
    }
    .circle.filled{ border-color: rgba(0,0,0,.22); color: rgba(0,0,0,.62); cursor:pointer; }
    .circle.filled .stamp{
      position:absolute; inset:0; border-radius:999px; border:1px dashed rgba(0,0,0,.18);
      transform:scale(.86); pointer-events:none;
    }
    .pcFoot{ margin-top:14px; display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:11px; color:var(--muted); }
    .pager{ display:flex; gap:8px; align-items:center; justify-content:flex-end; }
    .pager button{
      width:auto; padding:8px 10px; border-radius:var(--r);
      border:1px solid var(--btnLine); background:#fff; cursor:pointer; font-size:12px;
    }
    .pager button:disabled{opacity:.5; cursor:not-allowed}

    .log{
      background:#fafafa; border:1px solid #f0f0f0; border-radius:var(--r);
      padding:12px; margin-bottom:10px; font-size:13px; line-height:1.4;
    }
    .log .t{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-bottom:6px; }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      border:1px solid var(--line); border-radius:999px;
      padding:6px 10px; font-size:12px; color:var(--muted); background:#fff;
    }

    /* toast + modal */
    .toast{
      position:fixed; right:16px; bottom:16px;
      padding:12px 14px; border:1px solid var(--line);
      border-radius:var(--r); background:#fff; box-shadow:var(--shadow);
      display:none; max-width:360px; z-index:50;
    }
    .toast.show{display:block}
    .toast .t{font-weight:650; font-size:13px}
    .toast .m{margin-top:4px; color:var(--muted); font-size:12px; line-height:1.35}

    .backdrop{
      position:fixed; inset:0; background:rgba(0,0,0,.35);
      display:none; align-items:center; justify-content:center; padding:18px; z-index:60;
    }
    .backdrop.show{display:flex}
    .modal{
      width:min(560px, 100%);
      background:#fff; border:1px solid var(--line);
      border-radius:var(--r); box-shadow:var(--shadow); overflow:hidden;
    }
    .modal .head{
      padding:12px 14px; border-bottom:1px solid var(--line);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .modal .head .ttl{font-weight:700; font-size:14px}
    .modal .body{padding:14px}
    .modal .foot{padding:12px 14px; border-top:1px solid var(--line); display:flex; gap:10px; justify-content:flex-end;}

    @media (max-width: 980px){
      .circleGrid{ grid-template-columns: repeat(5, 1fr); }
      .twoCol{ grid-template-columns: 1fr; }
      .shell{ display:block; }}
</style>
</head>
<body>
  <div id="root"></div>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <div class="t" id="toastT">—</div>
    <div class="m" id="toastM">—</div>
  </div>

  <div class="backdrop" id="backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="mTitle">
      <div class="head">
        <div class="ttl" id="mTitle">—</div>
        <button class="btn ghost" style="width:auto;padding:8px 10px" id="mClose">Close</button>
      </div>
      <div class="body" id="mBody"></div>
      <div class="foot" id="mFoot"></div>
    </div>
  </div>

<script>
(() => {
  "use strict";

  const K = {
    user: "gthp_user_v13",
    points: "gthp_points_v13",
    logs: "gthp_logs_v13",
    session: "gthp_session_v13",
    settings: "gthp_settings_v13" // {target, page, startDate, drawerCollapsed}
  };

  const TARGET_DEFAULT = 66;
  const PAGE_SIZE = 20;

  const $ = (s, el=document)=>el.querySelector(s);

  function load(k, f){
    try{
      const v = localStorage.getItem(k);
      return v ? JSON.parse(v) : f;
    }catch{ return f; }
  }
  function save(k, v){ localStorage.setItem(k, JSON.stringify(v)); }

  async function sha256(text){
    const enc = new TextEncoder().encode(text);
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  function randSalt(len=16){
    const a = new Uint8Array(len);
    crypto.getRandomValues(a);
    return [...a].map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  function uid(){
    return Math.random().toString(16).slice(2) + Math.random().toString(16).slice(2);
  }

  const state = {
    user: load(K.user, null),
    points: Number(load(K.points, 0)) || 0,
    logs: load(K.logs, []), // [{id, ts, note}]
    session: load(K.session, {unlockedUntil:0}),
    settings: load(K.settings, {target: TARGET_DEFAULT, page: 0, startDate: "", drawerCollapsed:false}),
  };

  // UI helpers
  let toastTimer=null;
  function toast(t,m){
    $("#toastT").textContent=t;
    $("#toastM").textContent=m||"";
    $("#toast").classList.add("show");
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>$("#toast").classList.remove("show"), 3200);
  }
  function openModal(title, bodyHTML, footHTML){
    $("#mTitle").textContent = title;
    $("#mBody").innerHTML = bodyHTML;
    $("#mFoot").innerHTML = footHTML || "";
    $("#backdrop").classList.add("show");
    $("#backdrop").setAttribute("aria-hidden","false");
  }
  function closeModal(){
    $("#backdrop").classList.remove("show");
    $("#backdrop").setAttribute("aria-hidden","true");
    $("#mBody").innerHTML="";
    $("#mFoot").innerHTML="";
  }
  $("#mClose").addEventListener("click", closeModal);
  $("#backdrop").addEventListener("click", (e)=>{ if(e.target === $("#backdrop")) closeModal(); });

  // session
  function isUnlocked(){ return Date.now() < (state.session?.unlockedUntil || 0); }
  function lock(){ state.session.unlockedUntil = 0; save(K.session, state.session); }
  function unlock(minutes=30){ state.session.unlockedUntil = Date.now() + minutes*60*1000; save(K.session, state.session); }

  // routing
  function route(){
    const h = location.hash || "#/login";
    if(h.startsWith("#/reset")) return {page:"reset"};
    if(h.startsWith("#/app")){
      const parts = h.replace("#/","").split("/"); // app/sub
      const sub = (parts[1] || "dashboard").split("?")[0];
      return {page:"app", sub};
    }
    return {page:"login"};
  }

  // format
  const pad2 = n => String(n).padStart(2,"0");
  function fmt(ts){
    const d = new Date(ts);
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
  }
  function escapeHTML(s){
    return String(s??"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function clampTarget(v){
    const n = Number(v || TARGET_DEFAULT);
    if(!Number.isFinite(n)) return TARGET_DEFAULT;
    return Math.max(20, Math.min(365, Math.floor(n)));
  }

  // tenure -> recommended points (heuristic)
  function recommendedPointsFromStart(startISO){
    if(!startISO) return {target: TARGET_DEFAULT, tier:"", tenureMonths: 0};
    const start = new Date(startISO + "T00:00:00");
    if(Number.isNaN(+start)) return {target: TARGET_DEFAULT, tier:"", tenureMonths: 0};
    const now = new Date();
    let months = (now.getFullYear()-start.getFullYear())*12 + (now.getMonth()-start.getMonth());
    if(now.getDate() < start.getDate()) months -= 1;
    months = Math.max(0, months);

    let target, tier;
    if(months < 6){ target = 30; tier = "< 6 months"; }
    else if(months < 18){ target = 45; tier = "6–18 months"; }
    else if(months < 36){ target = 66; tier = "18–36 months"; }
    else if(months < 60){ target = 90; tier = "3–5 years"; }
    else { target = 120; tier = "5+ years"; }
    return {target, tier, tenureMonths: months};
  }

  // "AI analysis" (local heuristic, no network)
  function aiAnalyze(note, ts, n, points, target){
    const text = (note || "").toLowerCase();
    const tags = [];
    const add = (t)=>{ if(!tags.includes(t)) tags.push(t); };

    if(/加班|超時|爆量|忙|趕|壓力|崩潰|burnout|疲|累|身心/.test(text)) add("workload / burnout");
    if(/同事|主管|老闆|老闆娘|團隊|溝通|情緒勒索|人際|politics/.test(text)) add("people / communication");
    if(/薪|薪水|加薪|年終|獎金|待遇|錢|報價|cost|compensation/.test(text)) add("compensation");
    if(/制度|流程|規則|管理|okr|kpi/.test(text)) add("system / process");
    if(/成長|學習|學不到|沒發展|職涯|career|轉職/.test(text)) add("career growth");
    if(/健康|睡眠|失眠|焦慮|胃痛|頭痛|生病/.test(text)) add("health");
    if(/尊重|委屈|不被重視|不公平|覺得被/.test(text)) add("recognition / fairness");
    if(!tags.length) add("general");

    const d = new Date(ts);
    const when = `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    const progress = target ? Math.round((points/target)*100) : 0;

    let tone = "neutral";
    const neg = /爛|煩|氣|討厭|受不了|想離開|不行|崩|慘|焦慮|痛苦|hate|angry|tired|stressed/.test(text);
    const pos = /順利|完成|好|讚|感謝|學到|開心|ok|great|nice/.test(text);
    if(neg && !pos) tone = "negative";
    else if(pos && !neg) tone = "positive";

    const summary = (()=>{
      if(tags.includes("workload / burnout")) return "近期壓力或工作量訊號偏高，建議用可控的小步驟降低耗損。";
      if(tags.includes("people / communication")) return "事件核心偏向人際/溝通與邊界，建議把事實與情緒拆開記錄。";
      if(tags.includes("compensation")) return "內容涉及報酬/待遇，建議同步整理市場區間與可談判條件。";
      if(tags.includes("career growth")) return "內容指向職涯發展落差，建議把『想要的下一步』具體化成職缺條件。";
      if(tags.includes("health")) return "內容涉及健康/睡眠，建議優先做減壓與休息安排。";
      return "這筆紀錄可作為趨勢追蹤的一部分，建議保持一致的記錄粒度。";
    })();

    const advice = (()=>{
      const base = [];
      base.push(`進度：第 ${n} 點（${progress}%）｜日期：${when}`);
      if(tone==="negative") base.push("情緒強度偏高：建議補一行「我需要什麼」來對齊下一步。");
      if(tags.includes("workload / burnout")) base.push("下一步：列出 1 個可刪減/可委派項目，並設定截止時間。");
      if(tags.includes("people / communication")) base.push("下一步：把對話用『事實/需求/界線』三句式改寫，便於後續溝通。");
      if(tags.includes("compensation")) base.push("下一步：把薪資與福利拆成 3 條可談項，並標記底線。");
      if(tags.includes("career growth")) base.push("下一步：寫下 3 個「下一份工作必備條件」。");
      if(tags.includes("health")) base.push("下一步：安排 1 個可立刻做的恢復行為（睡眠、散步、補水）。");
      if(n >= (target-10)) base.push("倒數提醒：可開始更新履歷/作品集、建立職缺清單、準備交接。");
      return base.join("\n");
    })();

    return {tags, summary, advice};
  }

  function loginView(){
    return `
      <div class="center">
        <div class="card">
          <div class="title">
            <h1>Goodbye tension,<br>hello pension</h1>
            <div class="subtitle">Sign in</div>
          </div>

          <div class="form">
            <div class="field">
              <label>Username</label>
              <input id="u" autocomplete="username" placeholder="Username">
            </div>
            <div class="field">
              <label>Password</label>
              <input id="p" type="password" autocomplete="current-password" placeholder="Password">
            </div>

            <button class="btn primary" id="btnLogin">Login</button>
            <button class="btn ghost" id="btnForgot">Forgot password</button>
          </div>

          <div class="hint">
            第一次使用：輸入未來要用的帳密 → 按 Login → 填 Email（用於找回）。
          </div>
        </div>
      </div>
    `;
  }

  function resetView(){
    return `
      <div class="center">
        <div class="card">
          <div class="title">
            <h1>Reset password</h1>
            <div class="subtitle">Set a new password</div>
          </div>

          <div class="form">
            <div class="field">
              <label>Email</label>
              <input id="re" type="email" autocomplete="email" placeholder="you@example.com">
            </div>
            <div class="field">
              <label>New password</label>
              <input id="rp1" type="password" autocomplete="new-password" placeholder="At least 8 characters">
            </div>
            <div class="field">
              <label>Confirm</label>
              <input id="rp2" type="password" autocomplete="new-password" placeholder="Repeat password">
            </div>
            <button class="btn primary" id="btnReset">Save new password</button>
            <button class="btn ghost" id="btnBack">Back to login</button>
          </div>

          <div class="hint">
            此重設連結為本機原型（不含真正寄信）。若你是從 reset link 進來，會自動帶 token。
          </div>
        </div>
      </div>
    `;
  }

  function parseResetParams(){
    const h = location.hash || "";
    const idx = h.indexOf("?");
    if(idx < 0) return {token:"", email:""};
    const qs = h.slice(idx+1);
    const p = new URLSearchParams(qs);
    return {token: p.get("token")||"", email: p.get("email")||""};
  }

  
  function dashboardView(){
    const target = clampTarget(state.settings.target);
    const remain = Math.max(0, target - state.points);
    const progress = target ? Math.round((state.points/target)*100) : 0;

    const logs = [...state.logs].sort((a,b)=>b.ts-a.ts);
    const recent14 = logs.slice(0,14);
    const negCount = recent14.filter(l=>/爛|煩|氣|討厭|受不了|想離開|不行|崩|慘|焦慮|痛苦|hate|angry|tired|stressed|壓力|崩潰|burnout|累|失眠|胃痛|頭痛/.test((l.note||"").toLowerCase())).length;
    const burnout = Math.max(0, Math.min(100, Math.round(progress*0.55 + (recent14.length? (negCount/recent14.length)*100*0.45 : 0))));

    // insights buckets (last 30 logs)
    const recent30 = logs.slice(0,30);
    const buckets = {work:0, people:0, pay:0, health:0, growth:0, other:0};
    recent30.forEach(l=>{
      const t = (l.note||"").toLowerCase();
      if(/加班|超時|爆量|忙|壓力|burnout|趕|疲|累/.test(t)) buckets.work++;
      else if(/同事|主管|老闆|老闆娘|人際|溝通|politics/.test(t)) buckets.people++;
      else if(/薪|薪水|加薪|年終|獎金|待遇|compensation/.test(t)) buckets.pay++;
      else if(/健康|睡眠|失眠|焦慮|胃痛|頭痛|生病/.test(t)) buckets.health++;
      else if(/成長|學習|沒發展|職涯|career|轉職/.test(t)) buckets.growth++;
      else buckets.other++;
    });
    const total = Math.max(1, recent30.length);
    const row = (k, v)=>`
      <div class="log" style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
        <div style="font-weight:650">${k}</div>
        <div style="color:var(--muted);font-family:var(--mono)">${v} · ${Math.round((v/total)*100)}%</div>
      </div>
    `;

    const latest = logs[0];
    const snap = latest ? aiAnalyze(latest.note||"", latest.ts, logs.length, state.points, target) : null;

    return `
      <div class="stack">
        <div class="panel">
          <h2>Dashboard</h2>
          <div class="dashGrid">
            <div class="metric" id="mPoints" role="button" tabindex="0">
              <div class="k">Points</div>
              <div class="v">${state.points} / ${target}</div>
              <div class="s">Tap to open Point card & collect.</div>
            </div>
            <div class="metric" id="mRemain" role="button" tabindex="0">
              <div class="k">Remaining</div>
              <div class="v">${remain}</div>
              <div class="s">Countdown to target points.</div>
            </div>
            <div class="metric" id="mBurn" role="button" tabindex="0">
              <div class="k">Burnout level</div>
              <div class="v">${burnout}%</div>
              <div class="s">Tap to view insights below.</div>
            </div>
          </div>
        </div>

        <div class="panel" id="insightsSection">
          <h2>AI insights</h2>
          <div class="hint" style="text-align:left;margin-top:-6px;">
            最近 30 筆的匿名趨勢。單筆建議請到 Point card 點圓圈查看。
          </div>

          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin-top:14px;">
            <div>
              ${row("Workload", buckets.work)}
              ${row("People", buckets.people)}
              ${row("Compensation", buckets.pay)}
              ${row("Health", buckets.health)}
              ${row("Growth", buckets.growth)}
              ${row("Other", buckets.other)}
            </div>
            <div class="log" style="margin:0;">
              <div class="t">Latest snapshot</div>
              ${latest ? `
                <div style="white-space:pre-wrap; line-height:1.5;">${escapeHTML(snap.summary)}

Tags: ${escapeHTML(snap.tags.join(", "))}</div>
              ` : `<div class="hint" style="text-align:left;margin:0;">No logs yet.</div>`}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function pointsView(){
    const target = clampTarget(state.settings.target);
    const remain = Math.max(0, target - state.points);
    const pageCount = Math.max(1, Math.ceil(target / PAGE_SIZE));
    const page = Math.min(pageCount-1, Math.max(0, state.settings.page || 0));
    const start = page * PAGE_SIZE + 1;
    const end = Math.min(target, start + PAGE_SIZE - 1);

    const logsNewest = [...state.logs].sort((a,b)=>b.ts-a.ts);
    const last = logsNewest[0];

    const circles = [];
    for(let n=start; n<=end; n++){
      const filled = n <= state.points;
      circles.push(`
        <div class="circleWrap">
          <div class="circle ${filled?'filled':''}" data-circle="${n}" title="${filled?'View detail':''}">
            ${n}
            ${filled?`<div class="stamp"></div>`:""}
          </div>
        </div>
      `);
    }
    const padTo = Math.ceil(circles.length / 10) * 10;
    for(let i=circles.length; i<padTo; i++){
      circles.push(`<div class="circleWrap"><div class="circle" aria-hidden="true">—</div></div>`);
    }

    return `
      <div class="stack">
        <div class="panel">
          <h2>POINT CARD</h2>
          <div class="pcShell">
            <div class="pcHead">
              <div class="pill">auto timestamp</div>
              <div class="pcMeta">
                <div>${state.points} / ${target} · remaining ${remain}</div>
                <div>${last ? `last ${fmt(last.ts)}` : `no stamps`}</div>
              </div>
            </div>

            <div class="circleGrid">${circles.join("")}</div>

            <div class="pcFoot">
              <div class="pill">click filled circle to view</div>
              <div class="pager">
                <button id="btnPrev" ${page===0?'disabled':''}>Prev</button>
                <button id="btnNext" ${page===pageCount-1?'disabled':''}>Next</button>
              </div>
            </div>
          </div>
        </div>

        <div class="twoCol">
          <div class="panel">
            <h2>Collect point</h2>
            <div class="field">
              <label>手動日期時間（可不填；不填則自動用當下）</label>
              <input id="manualDT" type="datetime-local">
            </div>
            <div class="field" style="margin-top:10px;">
              <label>Detail (optional)</label>
              <textarea id="note" placeholder="集點細節（可留空）"></textarea>
            </div>
            <button class="btn primary" id="btnAdd">Add 1 point</button>
            <div class="hint" style="margin-top:10px;text-align:left;">
              若你有補登過去紀錄，可用手動日期時間。倒數 ≤ 10 會提醒你開始準備 Sign out。
            </div>
          </div>

          <div class="panel">
            <h2>History</h2>
            <div id="history">
              ${logsNewest.length ? logsNewest.slice(0,40).map(l=>`
                <div class="log">
                  <div class="t">${fmt(l.ts)}</div>
                  <div>${escapeHTML(l.note || "—")}</div>
                </div>
              `).join("") : `<div class="hint" style="text-align:left;">No records yet.</div>`}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  
  function appShellView(sub){
    const target = clampTarget(state.settings.target);
    const remain = Math.max(0, target - state.points);
    const view = sub==="points" ? pointsView() : dashboardView();
    const active = (x)=> sub===x ? "active" : "";

    return `
      <div class="drawerOverlay" id="drawerOverlay" aria-hidden="true"></div>
      <aside class="drawer" id="drawer" aria-hidden="true">
        <div class="drawerTitle">Directory</div>
        <div class="nav">
          <a href="#/app/dashboard" class="${active("dashboard")}"><span>Dashboard</span><small>overview + insights</small></a>
          <a href="#/app/points" class="${active("points")}"><span>Point card</span><small>collect & history</small></a>
        </div>
        <div class="hint" style="text-align:left;margin-top:12px;">
          點背景可關閉目錄。
        </div>
      </aside>

      <div class="container">
        <div class="topbar">
          <div class="topLeft">
            <button class="hamburger" id="btnDrawer">Menu</button>
            <div style="min-width:0;">
              <div class="brand">Goodbye tension, hello pension</div>
              <div class="kpi">Sign out · ${state.points}/${target} · remaining ${remain}</div>
            </div>
          </div>
          <div style="display:flex; gap:10px;">
            <button class="btn ghost" style="width:auto" id="btnSettings">Settings</button>
            <button class="btn primary" style="width:auto" id="btnSignout">Sign out</button>
          </div>
        </div>

        <div class="shell">
          <main class="content">${view}</main>
        </div>
      </div>
    `;
  }

  function render(){
    const r = route();
    const root = $("#root");

    if(r.page === "app"){
      if(!state.user || !isUnlocked()){
        location.hash = "#/login";
        root.innerHTML = loginView();
        bindLogin();
        return;
      }
      root.innerHTML = appShellView(r.sub || "dashboard");
      bindAppShell(r.sub || "dashboard");
      return;
    }

    if(r.page === "reset"){
      root.innerHTML = resetView();
      bindReset();
      return;
    }

    root.innerHTML = loginView();
    bindLogin();
  }

  function bindLogin(){
    $("#btnLogin").addEventListener("click", async ()=>{
      const username = ($("#u").value||"").trim();
      const pass = ($("#p").value||"");
      if(!username || !pass){
        toast("Missing", "Please enter username and password.");
        return;
      }

      // First-time setup
      if(!state.user){
        openModal(
          "Set recovery email",
          `
            <div class="field">
              <label>Recovery email</label>
              <input id="firstEmail" type="email" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="hint" style="text-align:left;margin-top:8px;">
              用於忘記密碼時比對身份與產生 reset link（原型）。
            </div>
          `,
          `<button class="btn ghost" style="width:auto" id="mCancel">Cancel</button>
           <button class="btn primary" style="width:auto" id="mSave">Save</button>`
        );

        $("#mCancel").onclick = closeModal;
        $("#mSave").onclick = async ()=>{
          const email = ($("#firstEmail").value||"").trim();
          if(!email || !email.includes("@")){
            toast("Invalid email", "Please enter a valid email.");
            return;
          }
          const salt = randSalt();
          const passHash = await sha256(pass + salt);
          state.user = { username, email, salt, passHash, resetHash:"", resetExp:0 };
          save(K.user, state.user);

          state.points = 0;
          state.logs = [];
          save(K.points, state.points);
          save(K.logs, state.logs);

          closeModal();
          unlock(30);
          toast("Created", "Account saved on this device.");
          location.hash = "#/app/dashboard";
          render();
        };
        return;
      }

      // normal login
      if(username !== state.user.username){
        toast("Wrong login", "Username mismatch.");
        return;
      }
      const hash = await sha256(pass + state.user.salt);
      if(hash !== state.user.passHash){
        toast("Wrong login", "Password mismatch.");
        return;
      }
      unlock(30);
      toast("Unlocked", "Welcome back.");
      location.hash = "#/app/dashboard";
      render();
    });

    $("#btnForgot").addEventListener("click", ()=>{
      if(!state.user){
        toast("No account", "No local account found yet.");
        return;
      }
      openModal(
        "Forgot password",
        `
          <div class="hint" style="text-align:left;margin-top:0;">
            請輸入你當初設定的 Email。系統會產生 reset link（可複製或用 mailto 寄給自己）。
          </div>
          <div class="field" style="margin-top:12px;">
            <label>Email</label>
            <input id="fpEmail" type="email" placeholder="you@example.com" autocomplete="email">
          </div>
          <div class="field">
            <label>Reset link</label>
            <input id="fpLink" type="text" readonly value="">
          </div>
          <div class="hint" style="text-align:left;">
            連結有效 30 分鐘。
          </div>
        `,
        `
          <button class="btn ghost" style="width:auto" id="fpClose">Close</button>
          <button class="btn ghost" style="width:auto" id="fpMail">Mail to me</button>
          <button class="btn primary" style="width:auto" id="fpCopy">Copy link</button>
        `
      );

      const emailEl = $("#fpEmail");
      const linkEl = $("#fpLink");

      async function genLink(){
        const email = (emailEl.value||"").trim();
        if(!email || !email.includes("@")){
          linkEl.value = "";
          return null;
        }
        if(email !== state.user.email){
          linkEl.value = "";
          return "mismatch";
        }
        const token = uid();
        const exp = Date.now() + 30*60*1000;
        const resetHash = await sha256(token + state.user.salt);
        state.user.resetHash = resetHash;
        state.user.resetExp = exp;
        save(K.user, state.user);
        const base = `${location.origin}${location.pathname}`;
        const link = `${base}#/reset?token=${encodeURIComponent(token)}&email=${encodeURIComponent(email)}`;
        linkEl.value = link;
        return link;
      }

      emailEl.addEventListener("input", async ()=>{
        const r = await genLink();
        if(r === "mismatch"){
          toast("Email mismatch", "This email does not match the stored recovery email.");
        }
      });

      $("#fpClose").onclick = closeModal;

      $("#fpCopy").onclick = async ()=>{
        const link = await genLink();
        if(link === "mismatch"){
          toast("Email mismatch", "Please enter the correct email.");
          return;
        }
        if(!link){
          toast("Missing", "Please enter a valid email first.");
          return;
        }
        try{
          await navigator.clipboard.writeText(link);
          toast("Copied", "Reset link copied.");
        }catch{
          toast("Copy failed", "Browser clipboard permission denied.");
        }
      };

      $("#fpMail").onclick = async ()=>{
        const link = await genLink();
        if(link === "mismatch"){
          toast("Email mismatch", "Please enter the correct email.");
          return;
        }
        if(!link){
          toast("Missing", "Please enter a valid email first.");
          return;
        }
        const subject = encodeURIComponent("GTHP password reset link");
        const body = encodeURIComponent(`Here is your reset link (valid 30 minutes):\n\n${link}\n\nIf you did not request this, ignore this message.`);
        window.location.href = `mailto:${encodeURIComponent(state.user.email)}?subject=${subject}&body=${body}`;
      };
    });
  }

  function bindReset(){
    const {token, email} = parseResetParams();
    $("#re").value = email || "";

    $("#btnBack").addEventListener("click", ()=>{
      location.hash = "#/login";
      render();
    });

    $("#btnReset").addEventListener("click", async ()=>{
      if(!state.user){
        toast("No account", "No local account found.");
        return;
      }
      const e = ($("#re").value||"").trim();
      const p1 = ($("#rp1").value||"");
      const p2 = ($("#rp2").value||"");
      if(!e || !e.includes("@")){
        toast("Invalid email", "Please enter a valid email.");
        return;
      }
      if(e !== state.user.email){
        toast("Email mismatch", "Email does not match the stored recovery email.");
        return;
      }
      if(p1.length < 8){
        toast("Too short", "Password must be at least 8 characters.");
        return;
      }
      if(p1 !== p2){
        toast("Mismatch", "Please confirm the same password.");
        return;
      }

      if(token){
        if(Date.now() > (state.user.resetExp||0)){
          toast("Expired", "Reset link expired. Generate a new one.");
          return;
        }
        const digest = await sha256(token + state.user.salt);
        if(digest !== state.user.resetHash){
          toast("Invalid", "Reset link invalid. Generate a new one.");
          return;
        }
      }else{
        if(!isUnlocked()){
          toast("Token required", "Open via a reset link, or login first.");
          return;
        }
      }

      const newHash = await sha256(p1 + state.user.salt);
      state.user.passHash = newHash;
      state.user.resetHash = "";
      state.user.resetExp = 0;
      save(K.user, state.user);
      lock();
      toast("Updated", "Password updated. Please login again.");
      location.hash = "#/login";
      render();
    });
  }

  
  function bindAppShell(sub){
    const drawer = document.getElementById("drawer");
    const overlay = document.getElementById("drawerOverlay");

    const closeDrawer = ()=>{
      drawer.classList.remove("show");
      overlay.classList.remove("show");
      drawer.setAttribute("aria-hidden","true");
      overlay.setAttribute("aria-hidden","true");
    };
    const openDrawer = ()=>{
      drawer.classList.add("show");
      overlay.classList.add("show");
      drawer.setAttribute("aria-hidden","false");
      overlay.setAttribute("aria-hidden","false");
    };

    document.getElementById("btnDrawer").addEventListener("click", ()=>{
      if(drawer.classList.contains("show")) closeDrawer();
      else openDrawer();
    });
    overlay.addEventListener("click", closeDrawer);

    // sign out
    $("#btnSignout").addEventListener("click", ()=>{
      lock();
      toast("Signed out", "");
      location.hash = "#/login";
      render();
    });

    // settings modal (global)
    $("#btnSettings").addEventListener("click", ()=>{
      const startDate = state.settings.startDate || "";
      const rec = recommendedPointsFromStart(startDate);

      openModal(
        "Settings",
        `
          <div class="field">
            <label>入職日（Start date）</label>
            <input id="setStart" type="date" value="${escapeHTML(startDate)}">
          </div>

          <div class="field" style="margin-top:12px;">
            <label>推薦集點目標（Recommended target）</label>
            <input id="recTarget" type="text" readonly value="${rec.target} points ${rec.tier?` · ${rec.tier}`:""}">
          </div>

          <div class="hint" style="text-align:left;margin-top:8px;">
            依「可維持的時間盒（30/45/66/90/120）」自動推薦。
          </div>

          <div class="field" style="margin-top:12px;">
            <label>目前目標（Current target）</label>
            <input id="setTarget" type="number" min="20" max="365" value="${clampTarget(state.settings.target)}">
          </div>
        `,
        `
          <button class="btn ghost" style="width:auto" id="stClose">Close</button>
          <button class="btn ghost" style="width:auto" id="stApply">Apply recommended</button>
          <button class="btn primary" style="width:auto" id="stSave">Save</button>
        `
      );

      const updateRec = ()=>{
        const d = ($("#setStart").value||"").trim();
        const r = recommendedPointsFromStart(d);
        $("#recTarget").value = `${r.target} points ${r.tier?` · ${r.tier}`:""}`;
      };
      $("#setStart").addEventListener("input", updateRec);

      $("#stClose").onclick = closeModal;
      $("#stApply").onclick = ()=>{
        const d = ($("#setStart").value||"").trim();
        const r = recommendedPointsFromStart(d);
        $("#setTarget").value = r.target;
        toast("Applied", `Target set to ${r.target}.`);
      };
      $("#stSave").onclick = ()=>{
        const d = ($("#setStart").value||"").trim();
        state.settings.startDate = d;
        state.settings.target = clampTarget($("#setTarget").value);
        state.settings.page = 0;
        save(K.settings, state.settings);
        closeModal();
        toast("Saved", "Settings updated.");
        render();
      };
    });

    // dashboard click-through
    if(sub === "dashboard"){
      const goPoints = ()=>{ location.hash = "#/app/points"; };
      const bindCard = (id, fn)=>{
        const el = document.getElementById(id);
        if(!el) return;
        el.addEventListener("click", fn);
        el.addEventListener("keydown", (e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); fn(); } });
      };
      bindCard("mPoints", goPoints);
      bindCard("mRemain", goPoints);
      bindCard("mBurn", ()=>{
        const sec = document.getElementById("insightsSection");
        if(sec) sec.scrollIntoView({behavior:"smooth", block:"start"});
      });
      return;
    }

    if(sub !== "points") return;

    // points bindings
    const target = clampTarget(state.settings.target);
    const pageCount = Math.max(1, Math.ceil(target / PAGE_SIZE));
    const page = Math.min(pageCount-1, Math.max(0, state.settings.page || 0));

    $("#btnPrev").addEventListener("click", ()=>{
      state.settings.page = Math.max(0, page-1);
      save(K.settings, state.settings);
      render();
    });
    $("#btnNext").addEventListener("click", ()=>{
      state.settings.page = Math.min(pageCount-1, page+1);
      save(K.settings, state.settings);
      render();
    });

    $("#btnAdd").addEventListener("click", ()=>{
      const target = clampTarget(state.settings.target);
      if(state.points >= target){
        toast("Completed", "You already reached the target.");
        return;
      }

      const manual = ($("#manualDT").value || "").trim();
      let ts = Date.now();
      if(manual){
        const dt = new Date(manual);
        if(!Number.isNaN(+dt)){
          ts = +dt;
        }else{
          toast("Invalid date", "Manual date/time is invalid.");
          return;
        }
      }

      state.points = Number(state.points||0) + 1;
      const note = ($("#note").value||"").trim();
      const rec = { id: uid(), ts, note };
      state.logs.unshift(rec);

      save(K.points, state.points);
      save(K.logs, state.logs);

      $("#note").value="";
      $("#manualDT").value="";

      state.settings.page = Math.floor((state.points - 1) / PAGE_SIZE);
      save(K.settings, state.settings);

      render();

      const remain = Math.max(0, target - state.points);
      if(remain <= 10){
        toast("Reminder", "倒數階段：記得準備 Sign out（找新工作 / 交接 / 財務緩衝）。");
      }else{
        toast("Stamped", `已集點：${state.points}/${target}`);
      }
    });

    document.querySelectorAll("[data-circle]").forEach(el=>{
      el.addEventListener("click", ()=>{
        const n = Number(el.getAttribute("data-circle"));
        if(!(n <= state.points)) return;

        const oldestFirst = [...state.logs].sort((a,b)=>a.ts-b.ts);
        const rec = oldestFirst[n-1];

        openModal(
          `Stamp #${n}`,
          (() => {
            const analysis = aiAnalyze(rec ? rec.note : "", rec ? rec.ts : Date.now(), n, state.points, clampTarget(state.settings.target));
            return `
            <div class="field">
              <label>Timestamp</label>
              <input value="${rec ? fmt(rec.ts) : "-"}" readonly>
            </div>
            <div class="field" style="margin-top:10px;">
              <label>Detail</label>
              <textarea readonly style="min-height:120px;">${rec ? (rec.note||"") : ""}</textarea>
            </div>
            <div class="field" style="margin-top:10px;">
              <label>AI analysis（本機分析）</label>
              <textarea readonly style="min-height:140px; font-family: var(--sans);">${analysis.summary}

Tags: ${analysis.tags.join(", ")}

${analysis.advice}</textarea>
            </div>
            `;
          })(),
          ``
        );
      });
    });
  }

  // boot

  window.addEventListener("hashchange", render);

  if(route().page === "app"){
    if(!state.user || !isUnlocked()){
      location.hash = "#/login";
    }
  }

  render();
})();
</script>
</body>
</html>
